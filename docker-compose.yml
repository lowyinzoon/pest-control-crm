services:
  postgres:
    image: postgres:16-alpine
    container_name: pestcontrol-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: pestcontrol
      POSTGRES_PASSWORD: pestcontrol123
      POSTGRES_DB: pestcontrol_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pestcontrol-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
